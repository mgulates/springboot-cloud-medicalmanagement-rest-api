<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments - Medical Management</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">Medical Management</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/home}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/patients}">Patients</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/doctors}">Doctors</a>
        </li>
        <li class="nav-item active" sec:authorize="hasRole('ROLE_ADMIN')">
          <a class="nav-link" th:href="@{/appointments}">Appointments</a>
        </li>
      </ul>
      <div class="navbar-nav">
                    <span class="nav-item nav-link text-light">
                        Welcome, <span sec:authentication="name"></span>
                    </span>
        <form th:action="@{/logout}" method="post" class="d-inline">
          <button class="btn btn-outline-light" type="submit">Logout</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Appointments</h2>
    <div sec:authorize="hasRole('ROLE_ADMIN')">
      <a th:href="@{/appointments/add}" class="btn btn-primary">Add New Appointment</a>
    </div>
  </div>

  <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="appointment : ${appointments}">
        <td th:text="${appointment.id}"></td>
        <td th:text="${appointment.patient.name}"></td>
        <td th:text="${appointment.doctor.name}"></td>
        <td th:text="${appointment.appointmentDate}"></td>
        <td th:text="${appointment.appointmentTime}"></td>
        <td>
          <a th:href="@{/appointments/edit/{id}(id=${appointment.id})}" class="btn btn-sm btn-warning">Edit</a>
          <a th:href="@{/appointments/delete/{id}(id=${appointment.id})}" class="btn btn-sm btn-danger"
             onclick="return confirm('Are you sure you want to delete this appointment?')">Delete</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
